<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' ws://localhost:* http://localhost:*;" />
    <title>Kanvas for Kit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      /* Prevent FOUC - matches light theme surface color */
      html {
        background-color: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Debug sentinel: stays visible if module bundle never executes -->
    <div id="js-sentinel" style="position:fixed;inset:0;background:#1a1a2e;color:#e94560;font-family:monospace;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:99998">
      JS bundle did not execute — script not loaded or CSP blocked
    </div>
    <script type="module" src="/renderer/index.tsx"></script>
  </body>
</html>
