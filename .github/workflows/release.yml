name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Linux needs GCC 13+ for C++20 (required by Electron 33+ native modules)
      - name: Install C++20 compiler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
        env:
          CC: gcc-13
          CXX: g++-13

      - name: Install Dependencies
        # --ignore-scripts skips postinstall (electron-builder install-app-deps)
        # which tries to rebuild optional native modules like tree-sitter.
        # electron-builder handles native deps via npmRebuild config at build time.
        run: npm ci --ignore-scripts
        env:
          CC: ${{ runner.os == 'Linux' && 'gcc-13' || '' }}
          CXX: ${{ runner.os == 'Linux' && 'g++-13' || '' }}

      - name: Build App
        run: npm run build

      - name: Build & Publish Electron App
        shell: bash
        run: |
          # Only configure code signing when certificates are provided.
          # Passing an empty CSC_LINK causes electron-builder to attempt signing
          # and fail with "not a file" even when CSC_IDENTITY_AUTO_DISCOVERY=false.
          if [ -n "$_CSC_LINK" ]; then
            export CSC_LINK="$_CSC_LINK"
            export CSC_KEY_PASSWORD="$_CSC_KEY_PASSWORD"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          _CSC_LINK: ${{ secrets.CSC_LINK }}
          _CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
